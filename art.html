<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="https://use.typekit.net/stn7ubm.css" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jin's Creative Work</title>
    <style>
      /* Art page specific styles */
      .art-section {
        margin: 4rem 0;
        text-align: center;
      }

      .art-gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1.5rem;
        margin-top: 2rem;
        align-items: start;
      }

      .art-item {
        background: rgba(255, 255, 255, 0.8);
        border-radius: 15px;
        padding: 0.5rem;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        transition: transform 0.3s ease;
        overflow: hidden;
      }

      .art-item:hover {
        transform: translateY(-5px);
      }

      .art-item img {
        width: 100%;
        height: auto;
        border-radius: 10px;
        object-fit: contain;
        display: block;
        max-height: 500px;
      }

      /* Special handling for different orientations */
      .art-item img[src*="7025"],
      .art-item img[src*="7027"] {
        /* Vertical images */
        max-height: 400px;
      }

      .art-item img[src*="7026"],
      .art-item img[src*="7028"], 
      .art-item img[src*="7030"] {
        /* Horizontal images */
        max-height: 300px;
      }

      .youtube-section {
        margin: 4rem 0;
        text-align: center;
      }

      .youtube-container {
        max-width: 800px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.8);
        border-radius: 15px;
        padding: 2rem;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      }

      .youtube-video {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        overflow: hidden;
        max-width: 100%;
        border-radius: 10px;
        margin-top: 1rem;
      }

      .youtube-video iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      .writing-section {
        margin: 4rem 0;
        text-align: center;
      }

      .writing-container {
        max-width: 600px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.8);
        border-radius: 15px;
        padding: 2rem;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      }

      .btn {
        background: #2d5a5a;
        color: white;
        padding: 0.75rem 2rem;
        border: none;
        border-radius: 25px;
        font-size: 1rem;
        font-weight: 500;
        text-decoration: none;
        display: inline-block;
        margin-top: 1rem;
        transition: background 0.3s ease;
      }

      .btn:hover {
        background: #1a3d3d;
      }

      .channel-link {
        color: #2d5a5a;
        text-decoration: none;
        font-weight: 500;
        margin-top: 1rem;
        display: inline-block;
      }

      .channel-link:hover {
        color: #1a3d3d;
      }

      @media screen and (max-width: 814px) {
        .art-gallery {
          grid-template-columns: 1fr;
          gap: 1rem;
        }

        .art-item img[src*="7025"],
        .art-item img[src*="7027"] {
          max-height: 350px;
        }

        .art-item img[src*="7026"],
        .art-item img[src*="7028"], 
        .art-item img[src*="7030"] {
          max-height: 250px;
        }

        .youtube-container, .writing-container {
          padding: 1rem;
          margin: 1rem;
        }
      }
    </style>
  </head>
  <body style="background-image: linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.85)), url('./UmZUS1k.png'); background-size: cover; background-position: center; background-attachment: fixed;">
